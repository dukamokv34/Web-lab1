<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор - Лабораторна робота №1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Базові стилі калькулятора */
        .calc-btn { width: 100%; height: 60px; font-size: 1.2rem; }
        .calc-display { height: 80px; font-size: 2.5rem; text-align: right; background-color: #f8f9fa; }
        .prog-btn { font-weight: bold; background-color: #e9ecef; border: 1px solid #ced4da; }
        .prog-btn:hover { background-color: #dee2e6; }

        /* Приховуємо системні радіокнопки */
        .mode-radio { display: none; }

        /* CSS-хак для перемикання панелей програміста */
        #mode-programmer:checked ~ .card .programmer-panel { display: block !important; }
        #mode-programmer:checked ~ .card .programmer-buttons { display: flex !important; }

        /* Підсвічування активного режиму в кнопках-перемикачах */
        #mode-standard:checked ~ .card .btn-standard { 
            background-color: #f8f9fa; 
            color: #0d6efd; 
            font-weight: bold;
        }
        #mode-programmer:checked ~ .card .btn-programmer { 
            background-color: #f8f9fa; 
            color: #0d6efd; 
            font-weight: bold;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">WebCalc</a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav text-center mt-3 mt-lg-0">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Калькулятор</a></li>
                        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 position-relative">
                
                <input type="radio" name="calcMode" id="mode-standard" class="mode-radio" checked>
                <input type="radio" name="calcMode" id="mode-programmer" class="mode-radio">

                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center rounded-top-3 py-3">
                        <h5 class="mb-0">Калькулятор</h5>
                        <div class="btn-group btn-group-sm" role="group">
                            <label for="mode-standard" class="btn btn-outline-light btn-standard mb-0">Звичайний</label>
                            <label for="mode-programmer" class="btn btn-outline-light btn-programmer mb-0">Для програміста</label>
                        </div>
                    </div>
                    <div class="card-body bg-white">
                        <input type="text" class="form-control calc-display mb-3 rounded-2 border-secondary" value="0" readonly>

                        <div class="programmer-panel mb-3 small text-muted font-monospace d-none">
                            <div class="d-flex justify-content-between"><span>HEX</span> <span class="text-dark">0</span></div>
                            <div class="d-flex justify-content-between"><span>DEC</span> <span class="text-dark">0</span></div>
                            <div class="d-flex justify-content-between"><span>OCT</span> <span class="text-dark">0</span></div>
                            <div class="d-flex justify-content-between"><span>BIN</span> <span class="text-dark">0</span></div>
                        </div>

                        <div class="programmer-buttons row g-2 mb-2 d-none">
                            <div class="col"><button class="btn prog-btn calc-btn">A</button></div>
                            <div class="col"><button class="btn prog-btn calc-btn">B</button></div>
                            <div class="col"><button class="btn prog-btn calc-btn">C</button></div>
                            <div class="col"><button class="btn prog-btn calc-btn">D</button></div>
                            <div class="col"><button class="btn prog-btn calc-btn">E</button></div>
                            <div class="col"><button class="btn prog-btn calc-btn">F</button></div>
                        </div>

                        <div class="row g-2">
                            <div class="col-3"><button class="btn btn-secondary calc-btn">C</button></div>
                            <div class="col-3"><button class="btn btn-secondary calc-btn">()</button></div>
                            <div class="col-3"><button class="btn btn-secondary calc-btn">%</button></div>
                            <div class="col-3"><button class="btn btn-warning text-white calc-btn">÷</button></div>
                            
                            <div class="col-3"><button class="btn btn-light border calc-btn">7</button></div>
                            <div class="col-3"><button class="btn btn-light border calc-btn">8</button></div>
                            <div class="col-3"><button class="btn btn-light border calc-btn">9</button></div>
                            <div class="col-3"><button class="btn btn-warning text-white calc-btn">×</button></div>
                            
                            <div class="col-3"><button class="btn btn-light border calc-btn">4</button></div>
                            <div class="col-3"><button class="btn btn-light border calc-btn">5</button></div>
                            <div class="col-3"><button class="btn btn-light border calc-btn">6</button></div>
                            <div class="col-3"><button class="btn btn-warning text-white calc-btn">-</button></div>
                            
                            <div class="col-3"><button class="btn btn-light border calc-btn">1</button></div>
                            <div class="col-3"><button class="btn btn-light border calc-btn">2</button></div>
                            <div class="col-3"><button class="btn btn-light border calc-btn">3</button></div>
                            <div class="col-3"><button class="btn btn-warning text-white calc-btn">+</button></div>
                            
                            <div class="col-3"><button class="btn btn-light border calc-btn">±</button></div>
                            <div class="col-3"><button class="btn btn-light border calc-btn">0</button></div>
                            <div class="col-3"><button class="btn btn-light border calc-btn">,</button></div>
                            <div class="col-3"><button class="btn btn-primary calc-btn">=</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">Лабораторна робота №1 | Виконав: студент групи КВ-34 Дука Михайло</p>
        </div>
    </footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
