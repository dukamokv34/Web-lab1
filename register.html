<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - Лабораторна робота №1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">WebCalc</a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav text-center mt-3 mt-lg-0">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Калькулятор</a></li>
                        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="flex-grow-1 container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-success text-white rounded-top-3 text-center py-3">
                        <h4 class="mb-0">Створити акаунт</h4>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <form>
                            <div class="mb-3">
                                <label for="regName" class="form-label">Ім'я</label>
                                <input type="text" class="form-control" id="regName" placeholder="Ваше ім'я" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="regEmail" class="form-label">Email адреса</label>
                                <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label d-block">Стать</label>
                                    <div class="form-check form-check-inline mt-1">
                                        <input class="form-check-input" type="radio" name="genderOptions" id="genderMale" value="male" checked>
                                        <label class="form-check-label" for="genderMale">Чоловіча</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="genderOptions" id="genderFemale" value="female">
                                        <label class="form-check-label" for="genderFemale">Жіноча</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="regDate" class="form-label">Дата народження</label>
                                    <input type="date" class="form-control" id="regDate" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 py-2">Зареєструватися</button>
                        </form>
                    </div>
                    <div class="card-footer text-center bg-white border-0 pb-4">
                        <small class="text-muted">Вже маєте акаунт? <a href="login.html" class="text-decoration-none">Увійти</a></small>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">
            <p class="mb-0">Лабораторна робота №1 | Виконав: студент групи КВ-34 Дука Михайло</p>
        </div>
    </footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
